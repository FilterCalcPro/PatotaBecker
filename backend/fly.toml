app = "patota-becker-api"
primary_region = "gru"

[build]

[env]
  PORT = "3333"
  DATABASE_URL = "file:/data/dev.db"

[[mounts]]
  source = "patota_data"
  destination = "/data"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
