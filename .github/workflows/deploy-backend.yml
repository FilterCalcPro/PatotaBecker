name: Deploy Backend no Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy no Fly.io
        run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rodar migração do banco
        run: flyctl ssh console -a patota-becker-api -C "npx prisma migrate deploy"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rodar seed
        run: flyctl ssh console -a patota-becker-api -C "npx tsx prisma/seed.ts"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
